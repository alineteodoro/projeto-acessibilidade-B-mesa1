<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="shortcut icon" type="image/x-icon" href="../assets/LogoModoEscuro.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>Login</title>
</head>

<body>
    <!-- a main contém o conteúdo principal da página -->
    <main class="auth">

        <!-- a primeira section contém o painel de login -->
        <section id="loginPanel" class="card" aria-labelledby="login-title">
            <form class="login-form">
                <h1 class="form-title">Bem-vindo de volta !!</h1>
                <p class="form-desc">Insira seu email e senha para ter acesso a todos os seus cursos
                </p>

                <label for="username">email</label>
                <input id="username" type="email" placeholder="EX: exemplo@dominio.com" required class="input-field">

                <label for="password">Senha</label>
                <input id="password" type="password" placeholder="Senha" required class="input-field">

                <button type="submit" class="btn">Login</button>
            </form>
        </section>

        <!-- a segunda section contém o painel de registro -->
        <!-- A tag hidden esconde o painel de registro -->
        <section id="registerPanel" class="card" aria-labelledby="register-title" hidden>

            <form class="register-form">
                <h1 id="registerTitle" class="form-title">Cadastre-se !!</h1>
                <p id="registerDesc" class="form-desc">Insira seu email e senha para ter acesso a todos os seus
                    cursos</p>
                <label for="username">Nome de Usuário</label>
                <input id="username" type="text" placeholder="Nome de usuário" required class="input-field">

                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Ex: exemplo@dominio.com" required class="input-field">

                <label for="password">Senha</label>
                <input id="password" type="password" placeholder="Senha" required class="input-field">

                <label for="confirmPassword">Confirme a Senha</label>
                <input id="confirmPassword" type="password" placeholder="Confirme a senha" required class="input-field">

                <button type="submit" class="btn">Cadastrar</button>
            </form>

        </section>
        <!-- o Aside contém informações adicionais e o painel que irá alternar ed local -->
        <aside id="bluePanel">

            <img src="../assets/LogoModoClaro.png" alt="Logo da plataforma de curso digital CAD" id="bluePanelLogo">
            <p id="bluePanelDesc">Insira seu email e senha para ter acesso a todos os seus cursos</p>
            <button id="toggleButton" class="btn">Cadastre-se</button>

        </aside>
    </main>
</body>

</html>
